name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:        # permet de relancer le déploiement à la main depuis l'onglet Actions

jobs:
  # Garde-fou : le déploiement n'a lieu que si le build Vite passe.
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: actuworld-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: actuworld-site/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    env:
      DEPLOY_DIR: /var/www/site-actuworld
    steps:
      - uses: actions/checkout@v4

      # Purge l'ancien source AVANT la copie (le SCP n'efface pas les fichiers
      # retirés du repo -> sinon fichiers fantômes au build).
      - name: Clean stale source via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ env.DEPLOY_DIR }}"
            rm -rf "${{ env.DEPLOY_DIR }}/actuworld-site/src" "${{ env.DEPLOY_DIR }}/actuworld-site/public"

      - name: Copy files via SSH
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "actuworld-site,docker-compose.yml"
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "${{ env.DEPLOY_DIR }}"
            # Réseau partagé avec Nginx Proxy Manager (déclaré external). Idempotent.
            docker network create app-network 2>/dev/null || true
            # Variables VITE_ injectées au build (build-args du compose).
            export VITE_GA_ID="${{ secrets.VITE_GA_ID }}"
            export VITE_BREVO_API_KEY="${{ secrets.VITE_BREVO_API_KEY }}"
            docker compose build
            docker compose up -d

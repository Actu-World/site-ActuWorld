server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # En-têtes de sécurité (repris de l'ancien vercel.json).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # HSTS : le TLS est terminé par Nginx Proxy Manager en amont, mais l'en-tête
  # traverse le proxy tel quel — c'est donc bien ici qu'on le pose.
  # Pas de `preload` : soumission à la liste HSTS preload = décision explicite.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Content-Security-Policy — origines réellement utilisées par le site :
  #   - script-src  : bundles Vite ('self') + gtag.js injecté dynamiquement après
  #                   consentement (useGoogleAnalytics). Pas de 'unsafe-inline' :
  #                   les <script type="application/ld+json"> de index.html sont
  #                   des blocs de données non exécutés, hors du champ de script-src.
  #   - style-src   : feuille Google Fonts (Platypi/Urbanist) + 'unsafe-inline'
  #                   requis par les attributs style inline React (et styles
  #                   injectés par les libs) — compromis classique d'une SPA.
  #   - font-src    : fichiers de polices servis par fonts.gstatic.com.
  #   - connect-src : Supabase (auth Studio), api.actuworld.fr (pairing QR,
  #                   brouillons) + endpoints de collecte GA4 (y compris
  #                   régionaux, d'où les wildcards).
  #   - img-src     : images locales, data: (SVG/QR inline) + pixels GA.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://*.google-analytics.com; connect-src 'self' https://upxwtqgbayappfzrhots.supabase.co https://api.actuworld.fr https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

  # Assets hashés -> cache long immuable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    # PIÈGE nginx : un `add_header` dans une location ANNULE l'héritage de TOUS
    # les add_header du niveau server pour ce bloc. Le Cache-Control ci-dessus
    # supprimerait donc les en-têtes de sécurité sur /assets/* — on les répète.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://*.google-analytics.com; connect-src 'self' https://upxwtqgbayappfzrhots.supabase.co https://api.actuworld.fr https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    try_files $uri =404;
  }

  # SPA : toute route inconnue retombe sur index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
